<!-- CONTENIDO -->

<div class="content">

<h1>Gestión de Docentes</h1>

<!-- FORMULARIO -->

<div class="card">

<form id="docenteForm">

<input id="codigo" placeholder="Código del docente" required>

<input id="nombres" placeholder="Nombres" required>

<input id="apellidos" placeholder="Apellidos" required>

<input id="email" type="email" placeholder="Correo electrónico" required>

<input id="area" placeholder="Área académica" required>

<button>
<i class="fa-solid fa-floppy-disk"></i> Guardar
</button>

</form>

</div>

<!-- BUSCADOR -->

<input id="buscar" placeholder="🔍 Buscar docente por nombre">

<!-- TABLA -->

<table>

<thead>

<tr>

<th>Código</th>

<th>Nombre</th>

<th>Email</th>

<th>Área</th>

<th>Acciones</th>

</tr>

</thead>

<tbody id="tablaDocentes"></tbody>

</table>

</div>

</div>
