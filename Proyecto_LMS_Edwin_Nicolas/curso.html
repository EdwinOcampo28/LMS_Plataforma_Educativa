<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Curso</title>

<link rel="stylesheet" href="css/styles.css">

</head>

<body>

<div class="layout">

<div class="sidebar">

<h2>LMS</h2>

<a href="dashboard.html">Dashboard</a>
<a href="pages/cursos.html">Cursos</a>
<a href="pages/contenidos.html">Contenidos</a>
<a href="pages/docentes.html">Docentes</a>
<a href="pages/administrativos.html">Administrativos</a>
<a href="public/cursos.html">Vista Pública</a>
<a href="index.html">Salir</a>

</div>

<div class="content">

<h1 id="tituloCurso"></h1>

<h2>Módulos</h2>

<div id="modulos"></div>

</div>

</div>

<script>

const params = new URLSearchParams(window.location.search)
const curso = params.get("curso")

const cursos = {

ia:{
titulo:"Introducción a IA",

modulos:[

{
nombre:"Conceptos básicos",
lecciones:[
"¿Qué es la IA?",
"Historia de la IA",
"Tipos de IA"
]
},

{
nombre:"Aplicaciones",
lecciones:[
"IA en medicina",
"IA en videojuegos",
"IA en empresas"
]
}

]

},

logica:{
titulo:"Lógica Matemática",

modulos:[

{
nombre:"Fundamentos",
lecciones:[
"Proposiciones",
"Tablas de verdad",
"Conectores lógicos"
]
},

{
nombre:"Razonamiento",
lecciones:[
"Silogismos",
"Demostraciones"
]
}

]

},

ingles:{
titulo:"Inglés Básico",

modulos:[

{
nombre:"Vocabulario",
lecciones:[
"Saludos",
"Números",
"Colores"
]
},

{
nombre:"Gramática",
lecciones:[
"Verbo To Be",
"Pronombres",
"Oraciones simples"
]
}

]

}

}

const data = cursos[curso]

document.getElementById("tituloCurso").innerText = data.titulo

const modulosDiv = document.getElementById("modulos")

data.modulos.forEach(m => {

let html = `
<div class="card">

<h3>${m.nombre}</h3>

<ul>
`

m.lecciones.forEach(l => {

html += `<li>${l}</li>`

})

html += `
</ul>

</div>
`

modulosDiv.innerHTML += html

})

</script>

</body>

</html>
