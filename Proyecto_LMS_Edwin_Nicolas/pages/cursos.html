<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Cursos</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>

    <h1>Gestión de Cursos</h1>

    <form id="cursoForm">

        <input id="codigo" placeholder="Código">
        <input id="nombre" placeholder="Nombre">
        <input id="descripcion" placeholder="Descripción">
        <input id="docente" placeholder="Código docente">

        <input id="duracion" placeholder="Duración (ej: 10 horas)">
        <input id="etiquetas" placeholder="Etiquetas (Python, Backend)">

        <select id="estado">
            <option value="Activo">Activo</option>
            <option value="Inactivo">Inactivo</option>
        </select>

        <button>Guardar Curso</button>

    </form>

    <table>

        <thead>
            <tr>
                <th>Código</th>
                <th>Nombre</th>
                <th>Docente</th>
                <th>Duración</th>
                <th>Etiquetas</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody id="tablaCursos"></tbody>

    </table>

    <h2>Módulos</h2>

    <form id="moduloForm">

        <input id="cursoModulo" placeholder="Código curso">
        <input id="moduloNombre" placeholder="Nombre módulo">

        <button>Agregar módulo</button>

    </form>

    <h2>Lecciones</h2>

    <form id="leccionForm">

        <input id="cursoLeccion" placeholder="Curso">
        <input id="moduloLeccion" placeholder="Módulo">
        <input id="titulo" placeholder="Título">
        <input id="contenido" placeholder="Contenido">

        <button>Agregar lección</button>

    </form>

    <script src="../js/cursos.js"></script>

</body>

</html>
