<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contenidos</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>LMS</h2>
        <a href="../dashboard.html">Dashboard</a>
        <a href="cursos.html">Cursos</a>
        <a href="contenidos.html">Contenidos</a>
        <a href="docentes.html">Docentes</a>
        <a href="administrativos.html">Administrativos</a>
        <a href="../public/cursos.html">Vista Pública</a>
        <a href="../index.html">Salir</a>
    </div>

    <!-- CONTENIDO -->
    <div class="content">
        <h1>Gestión de Contenidos</h1>

        <!-- FORMULARIO -->
        <div class="card">
            <h2>Agregar Contenido</h2>
            <form id="contenidoForm">
                <label>Curso</label>
                <input id="cursoContenido" placeholder="Nombre del curso">
                <label>Título de la lección</label>
                <input id="tituloContenido" placeholder="Ej: Introducción a Python">
                <label>Video</label>
                <input id="videoContenido" placeholder="URL del video">
                <label>Documento</label>
                <input id="documentoContenido" placeholder="Documento PDF o enlace">
                <label>Imagen</label>
                <input id="imagenContenido" placeholder="URL de la imagen">
                <label>Enlace</label>
                <input id="enlaceContenido" placeholder="Link externo">
                <button type="submit">Guardar Contenido</button>
            </form>
        </div>

        <!-- GRID DE CARDS -->
        <h2 style="margin-top:40px;">Vista de Contenidos</h2>
        <div id="contenidosCards" class="grid"></div>

    </div>

</div>
<script src="../js/contenidos.js"></script>
</body>
</html>
