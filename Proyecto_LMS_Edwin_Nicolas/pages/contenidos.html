<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Contenidos</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>

    <div class="layout">

        <!-- SIDEBAR -->
        <div class="sidebar">
            <h2>LMS</h2>
            <a href="../dashboard.html">Dashboard</a>
            <a href="cursos.html">Cursos</a>
            <a href="contenidos.html">Contenidos</a>
            <a href="docentes.html">Docentes</a>
            <a href="administrativos.html">Administrativos</a>
            <a href="../public/cursos.html">Vista Pública</a>
            <a href="../index.html">Salir</a>
        </div>

        <!-- CONTENIDO -->
        <div class="content">

            <h1>Gestión de Contenidos</h1>

            <!-- FORMULARIO -->
            <div class="card">

                <h2>Agregar Contenido</h2>

                <form id="contenidoForm">

                    <label>Curso</label>
                    <input id="curso" placeholder="Nombre del curso">

                    <label>Título de la lección</label>
                    <input id="titulo" placeholder="Ej: Introducción a Python">

                    <label>Video</label>
                    <input id="video" placeholder="URL del video">

                    <label>Documento</label>
                    <input id="documento" placeholder="Documento PDF o enlace">

                    <label>Imagen</label>
                    <input id="imagen" placeholder="URL de la imagen">

                    <label>Enlace</label>
                    <input id="enlace" placeholder="Link externo">

                    <button type="submit">Guardar Contenido</button>

                </form>

            </div>

            <!-- TABLA -->
            <h2 style="margin-top:40px;">Contenidos del Curso</h2>

            <table>

                <tr>
                    <th>Curso</th>
                    <th>Título</th>
                    <th>Video</th>
                    <th>Documento</th>
                    <th>Imagen</th>
                    <th>Enlace</th>
                </tr>

                <tr>
                    <td>Python</td>
                    <td>Introducción</td>
                    <td>Video</td>
                    <td>PDF</td>
                    <td>Imagen</td>
                    <td>Link</td>
                </tr>

            </table>

        </div>

    </div>
    <script src="../js/contenidos.js"></script>
</body>

</html>
