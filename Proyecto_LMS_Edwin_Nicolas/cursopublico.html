<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Curso</title>
<link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div class="layout">

<div class="sidebar">

<h2>LMS</h2>

<a href="dashboard.html">Dashboard</a>
<a href="pages/cursos.html">Cursos</a>
<a href="pages/contenidos.html">Contenidos</a>
<a href="pages/docentes.html">Docentes</a>
<a href="pages/administrativos.html">Administrativos</a>
<a href="public/cursos.html">Vista Pública</a>
<a href="index.html">Salir</a>

</div>

<div class="content">

<h1 id="tituloCurso"></h1>

<div id="infoCurso"></div>

<br>

<button onclick="unirseCurso()">Unirse a este curso</button>

<h2>Módulos</h2>

<div id="modulos"></div>

</div>

</div>

<script>

let cursos = JSON.parse(localStorage.getItem("cursos")) || []

let index = localStorage.getItem("cursoSeleccionado")

if(index === null || !cursos[index]){

document.getElementById("tituloCurso").innerText = "Curso no encontrado"

document.getElementById("infoCurso").innerHTML = "<p>Error cargando el curso.</p>"

throw new Error("Curso inválido")

}

let curso = cursos[index]

document.getElementById("tituloCurso").innerText = curso.nombre

document.getElementById("infoCurso").innerHTML = `
<p><b>Docente:</b> ${curso.docente}</p>
<p><b>Descripción:</b> ${curso.descripcion || "Sin descripción"}</p>
`

let modulosDiv = document.getElementById("modulos")

let contenidos = JSON.parse(localStorage.getItem("contenidos")) || []

let modulosCurso = contenidos.filter(c => c.curso === curso.nombre)

if(modulosCurso.length === 0){

modulosDiv.innerHTML = "<p>No hay módulos disponibles.</p>"

}else{

modulosCurso.forEach(m=>{

let html = `
<div class="card">

<h3>${m.modulo}</h3>

<ul>
<li>${m.leccion}</li>
</ul>

</div>
`

modulosDiv.innerHTML += html

})

}

function unirseCurso(){

let misCursos = JSON.parse(localStorage.getItem("misCursos")) || []

if(!misCursos.includes(index)){

misCursos.push(index)

localStorage.setItem("misCursos", JSON.stringify(misCursos))

alert("Te uniste al curso: " + curso.nombre)

}else{

alert("Ya estás inscrito en este curso")

}

}

</script>

</body>
</html>
